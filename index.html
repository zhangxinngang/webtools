<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具箱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .container { width: 100%; max-width: 720px; }
    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    a.tool-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 22px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
    }
    a.tool-card:hover {
      border-color: #6366f1;
      background: #1e1b4b;
      transform: translateY(-2px);
    }
    .tool-icon {
      font-size: 1.8rem;
      line-height: 1;
    }
    .tool-name {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .tool-desc {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.78rem;
      color: #334155;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>工具箱</h1>
  <p class="subtitle">常用开发工具集合</p>
  <div class="grid">
    <a class="tool-card" href="tools/timestamp-converter.html">
      <div class="tool-icon">🕐</div>
      <div class="tool-name">时间戳转换</div>
      <div class="tool-desc">时间戳与日期互转，支持多时区</div>
    </a>
    <a class="tool-card" href="tools/url-codec.html">
      <div class="tool-icon">🔗</div>
      <div class="tool-name">URL 编解码</div>
      <div class="tool-desc">URL encode/decode，解析 Query 参数，构建 Query String</div>
    </a>
    <a class="tool-card" href="tools/password-generator.html">
      <div class="tool-icon">🔑</div>
      <div class="tool-name">密码生成器</div>
      <div class="tool-desc">密码学级随机，强度评估，批量生成</div>
    </a>
    <a class="tool-card" href="tools/json-formatter.html">
      <div class="tool-icon">📋</div>
      <div class="tool-name">JSON 格式化</div>
      <div class="tool-desc">格式化、压缩、键名排序，语法高亮</div>
    </a>
    <a class="tool-card" href="tools/base64-codec.html">
      <div class="tool-icon">🔒</div>
      <div class="tool-name">Base64 编解码</div>
      <div class="tool-desc">文本与图片 Base64 互转，支持 URL-Safe 模式</div>
    </a>
  </div>
  <div class="footer">工具箱 · 本地运行，数据不出浏览器</div>
</div>
</body>
</html>
