<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { width: 100%; max-width: 640px; }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 32px;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 18px;
    }

    /* 密码展示 */
    .password-display {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .password-text {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 1.1rem;
      color: #a5f3fc;
      word-break: break-all;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    .icon-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 7px;
      padding: 8px 10px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: #334155; color: #e2e8f0; }
    .icon-btn.copied { background: #14532d; border-color: #166534; color: #86efac; }

    /* 强度条 */
    .strength-bar-wrap {
      height: 6px;
      background: #0f172a;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .strength-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.78rem;
      color: #64748b;
      display: flex;
      justify-content: space-between;
    }
    .strength-label span { font-weight: 600; }

    /* 长度滑块 */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .slider-label { font-size: 0.85rem; color: #94a3b8; min-width: 32px; }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      cursor: pointer;
      transition: background 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { background: #4f46e5; }
    .slider-value {
      font-family: monospace;
      font-size: 1rem;
      color: #a5f3fc;
      min-width: 28px;
      text-align: right;
    }

    /* 复选框选项 */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }
    .option-item:hover { border-color: #6366f1; }
    .option-item.checked { border-color: #6366f1; background: #1e1b4b; }
    .option-item input[type=checkbox] { display: none; }
    .check-icon {
      width: 18px;
      height: 18px;
      border: 2px solid #475569;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 0.7rem;
    }
    .option-item.checked .check-icon {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }
    .option-text { font-size: 0.85rem; color: #cbd5e1; }
    .option-sample {
      font-family: monospace;
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 2px;
    }

    /* 排除字符 */
    .field-row { margin-bottom: 16px; }
    .field-row label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; }
    .field-row input[type=text] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 9px 14px;
      color: #f1f5f9;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-row input[type=text]:focus { border-color: #6366f1; }
    .field-row input::placeholder { color: #475569; }

    /* 按钮 */
    .btn-row { display: flex; gap: 10px; }
    button.primary {
      flex: 1;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.primary:hover { background: #4f46e5; }
    button.secondary {
      background: #334155;
      color: #cbd5e1;
      border: none;
      border-radius: 8px;
      padding: 11px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.secondary:hover { background: #475569; }

    /* 批量生成 */
    .batch-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }
    .batch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 7px;
      padding: 8px 12px;
    }
    .batch-item .pw {
      flex: 1;
      font-family: monospace;
      font-size: 0.88rem;
      color: #a5f3fc;
      word-break: break-all;
    }
    .batch-item .copy-small {
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .batch-item .copy-small:hover { color: #93c5fd; }

    /* 历史 */
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #64748b;
      padding: 4px 0;
      border-bottom: 1px solid #1e293b;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .hw { flex: 1; color: #94a3b8; word-break: break-all; }
    .history-item .copy-small {
      background: transparent;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .history-item .copy-small:hover { color: #93c5fd; }
    .empty-hint { font-size: 0.82rem; color: #475569; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>密码生成器</h1>

  <!-- 主生成区 -->
  <div class="card">
    <div class="password-display">
      <div class="password-text" id="pwDisplay">点击生成密码</div>
      <button class="icon-btn" id="copyBtn" onclick="copyPassword()" title="复制">⎘</button>
      <button class="icon-btn" onclick="generate()" title="重新生成">↻</button>
    </div>
    <div class="strength-bar-wrap">
      <div class="strength-bar" id="strengthBar" style="width:0%"></div>
    </div>
    <div class="strength-label">
      <span>密码强度</span>
      <span id="strengthText">—</span>
    </div>
  </div>

  <!-- 设置 -->
  <div class="card">
    <h2>设置</h2>

    <div class="slider-row">
      <span class="slider-label">长度</span>
      <input type="range" id="lengthSlider" min="4" max="128" value="20" oninput="onLengthChange()">
      <span class="slider-value" id="lengthVal">20</span>
    </div>

    <div class="options-grid">
      <label class="option-item checked" id="optUpper" onclick="toggleOpt('upper')">
        <div class="check-icon">✓</div>
        <div>
          <div class="option-text">大写字母</div>
          <div class="option-sample">A B C … Z</div>
        </div>
      </label>
      <label class="option-item checked" id="optLower" onclick="toggleOpt('lower')">
        <div class="check-icon">✓</div>
        <div>
          <div class="option-text">小写字母</div>
          <div class="option-sample">a b c … z</div>
        </div>
      </label>
      <label class="option-item checked" id="optNumber" onclick="toggleOpt('number')">
        <div class="check-icon">✓</div>
        <div>
          <div class="option-text">数字</div>
          <div class="option-sample">0 1 2 … 9</div>
        </div>
      </label>
      <label class="option-item checked" id="optSymbol" onclick="toggleOpt('symbol')">
        <div class="check-icon">✓</div>
        <div>
          <div class="option-text">特殊符号</div>
          <div class="option-sample">! @ # $ % ^ &amp; *</div>
        </div>
      </label>
      <label class="option-item" id="optNoAmb" onclick="toggleOpt('noAmb')">
        <div class="check-icon"></div>
        <div>
          <div class="option-text">排除歧义字符</div>
          <div class="option-sample">0 O o l 1 I i</div>
        </div>
      </label>
      <label class="option-item" id="optNoDup" onclick="toggleOpt('noDup')">
        <div class="check-icon"></div>
        <div>
          <div class="option-text">不重复字符</div>
          <div class="option-sample">每个字符只用一次</div>
        </div>
      </label>
    </div>

    <div class="field-row">
      <label>额外排除字符（直接填写）</label>
      <input type="text" id="excludeInput" placeholder='如：; " \' oninput="generate()">
    </div>

    <div class="btn-row">
      <button class="primary" onclick="generate()">生成密码</button>
      <button class="secondary" onclick="generateBatch()">批量生成 ×10</button>
    </div>
  </div>

  <!-- 批量结果 -->
  <div class="card" id="batchCard" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="margin:0;">批量结果</h2>
      <button class="secondary" style="padding:6px 14px;font-size:0.8rem;" onclick="copyAllBatch()">全部复制</button>
    </div>
    <div class="batch-list" id="batchList"></div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="margin:0;">历史记录（最近 10 条）</h2>
      <button class="secondary" style="padding:6px 14px;font-size:0.8rem;" onclick="clearHistory()">清空</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-hint">还没有生成过密码</div>
    </div>
  </div>
</div>

<script>
  const CHARS = {
    upper:  'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:  'abcdefghijklmnopqrstuvwxyz',
    number: '0123456789',
    symbol: '!@#$%^&*()-_=+[]{}|;:,.<>?',
  };
  const AMBIGUOUS = new Set('0Ool1Ii');

  const opts = { upper: true, lower: true, number: true, symbol: true, noAmb: false, noDup: false };
  let history = [];

  function toggleOpt(key) {
    // Prevent unchecking all char-type options
    if (['upper','lower','number','symbol'].includes(key)) {
      const willBeOff = opts[key];
      if (willBeOff) {
        const active = ['upper','lower','number','symbol'].filter(k => opts[k]);
        if (active.length <= 1) return; // keep at least one
      }
    }
    opts[key] = !opts[key];
    const el = document.getElementById('opt' + key.charAt(0).toUpperCase() + key.slice(1));
    el.classList.toggle('checked', opts[key]);
    el.querySelector('.check-icon').textContent = opts[key] ? '✓' : '';
    generate();
  }

  function onLengthChange() {
    const v = document.getElementById('lengthSlider').value;
    document.getElementById('lengthVal').textContent = v;
    generate();
  }

  function buildCharset() {
    const exclude = new Set(document.getElementById('excludeInput').value.split(''));
    let pool = '';
    if (opts.upper)  pool += CHARS.upper;
    if (opts.lower)  pool += CHARS.lower;
    if (opts.number) pool += CHARS.number;
    if (opts.symbol) pool += CHARS.symbol;
    if (opts.noAmb)  pool = pool.split('').filter(c => !AMBIGUOUS.has(c)).join('');
    pool = pool.split('').filter(c => !exclude.has(c)).join('');
    // deduplicate pool chars
    pool = [...new Set(pool)].join('');
    return pool;
  }

  function randomPassword(pool, length) {
    if (!pool) return null;
    const arr = new Uint32Array(length * 2);
    crypto.getRandomValues(arr);
    const result = [];
    let ai = 0;
    while (result.length < length) {
      if (ai >= arr.length) {
        const more = new Uint32Array(length);
        crypto.getRandomValues(more);
        arr.set(more, 0);
        ai = 0;
      }
      const idx = arr[ai++] % pool.length;
      const ch = pool[idx];
      if (opts.noDup && result.includes(ch)) continue;
      result.push(ch);
    }
    return result.join('');
  }

  function calcStrength(pw, pool) {
    if (!pw) return { score: 0, label: '—', color: '#334155' };
    // Entropy = log2(pool^len)
    const entropy = Math.log2(Math.pow(pool.length, pw.length));
    let score, label, color;
    if (entropy < 28)      { score = 10; label = '极弱'; color = '#ef4444'; }
    else if (entropy < 36) { score = 25; label = '弱';   color = '#f97316'; }
    else if (entropy < 60) { score = 50; label = '一般'; color = '#eab308'; }
    else if (entropy < 80) { score = 75; label = '强';   color = '#22c55e'; }
    else                   { score = 100; label = '极强'; color = '#06b6d4'; }
    return { score, label, color, entropy: entropy.toFixed(1) };
  }

  function generate() {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const pool = buildCharset();
    if (!pool) {
      document.getElementById('pwDisplay').textContent = '字符集为空，请至少选择一种类型';
      return;
    }
    if (opts.noDup && length > pool.length) {
      document.getElementById('pwDisplay').textContent = `不重复模式下，长度不能超过 ${pool.length}`;
      return;
    }
    const pw = randomPassword(pool, length);
    document.getElementById('pwDisplay').textContent = pw;
    const s = calcStrength(pw, pool);
    document.getElementById('strengthBar').style.width = s.score + '%';
    document.getElementById('strengthBar').style.background = s.color;
    document.getElementById('strengthText').textContent = `${s.label}（熵 ${s.entropy} bits）`;
    document.getElementById('strengthText').style.color = s.color;
    addHistory(pw);
    return pw;
  }

  function generateBatch() {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const pool = buildCharset();
    if (!pool) return;
    if (opts.noDup && length > pool.length) return;
    const passwords = Array.from({ length: 10 }, () => randomPassword(pool, length));
    const card = document.getElementById('batchCard');
    const list = document.getElementById('batchList');
    card.style.display = 'block';
    list.innerHTML = passwords.map(pw => `
      <div class="batch-item">
        <span class="pw">${pw}</span>
        <button class="copy-small" onclick="copyText('${escJs(pw)}', this)">复制</button>
      </div>
    `).join('');
    passwords.forEach(addHistory);
  }

  function copyAllBatch() {
    const pws = [...document.querySelectorAll('#batchList .pw')].map(el => el.textContent);
    navigator.clipboard.writeText(pws.join('\n'));
  }

  function copyPassword() {
    const pw = document.getElementById('pwDisplay').textContent;
    if (!pw || pw.startsWith('字符集') || pw.startsWith('不重复')) return;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
    });
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });
  }

  function addHistory(pw) {
    history = [pw, ...history.filter(p => p !== pw)].slice(0, 10);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="empty-hint">还没有生成过密码</div>';
      return;
    }
    list.innerHTML = history.map(pw => `
      <div class="history-item">
        <span class="hw">${pw}</span>
        <button class="copy-small" onclick="copyText('${escJs(pw)}', this)">复制</button>
      </div>
    `).join('');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function escJs(s) {
    return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // Init
  generate();
</script>
</body>
</html>
