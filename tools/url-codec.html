<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 编解码工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 780px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 32px;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 4px;
    }
    .mode-toggle button {
      flex: 1;
      padding: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      background: transparent;
      color: #64748b;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-toggle button.active {
      background: #6366f1;
      color: #fff;
    }
    .mode-toggle button:hover:not(.active) {
      color: #cbd5e1;
      background: #1e293b;
    }
    textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 0.9rem;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #475569; }
    .actions {
      display: flex;
      gap: 10px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
    button.secondary {
      background: #334155;
      color: #cbd5e1;
    }
    button.secondary:hover { background: #475569; }
    button.danger {
      background: #7f1d1d;
      color: #fca5a5;
    }
    button.danger:hover { background: #991b1b; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .output-label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .copy-btn {
      font-size: 0.78rem;
      padding: 4px 12px;
      background: #1e3a5f;
      color: #93c5fd;
      border-radius: 6px;
    }
    .copy-btn:hover { background: #1e40af; }
    .copy-btn.copied {
      background: #14532d;
      color: #86efac;
    }
    .output-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 0.88rem;
      color: #a5f3fc;
      word-break: break-all;
      white-space: pre-wrap;
      min-height: 80px;
      line-height: 1.7;
    }
    .output-box.error { color: #f87171; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      color: #475569;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }
    .params-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .params-table th {
      text-align: left;
      padding: 8px 12px;
      background: #0f172a;
      color: #64748b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #334155;
    }
    .params-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #1e293b;
      vertical-align: top;
      word-break: break-all;
    }
    .params-table tr:last-child td { border-bottom: none; }
    .param-key { color: #c084fc; font-family: monospace; }
    .param-val { color: #a5f3fc; font-family: monospace; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-info { background: #1e3a5f; color: #93c5fd; }
    .url-parts { margin-top: 12px; }
    .url-part-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.85rem;
    }
    .url-part-row:last-child { border-bottom: none; }
    .url-part-label {
      min-width: 80px;
      color: #64748b;
      font-size: 0.78rem;
    }
    .url-part-value { color: #a5f3fc; font-family: monospace; word-break: break-all; }
    .stats {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .stat {
      font-size: 0.78rem;
      color: #64748b;
    }
    .stat span { color: #94a3b8; }
  </style>
</head>
<body>
<div class="container">
  <h1>URL 编解码工具</h1>

  <!-- 编码/解码 -->
  <div class="card">
    <h2>编码 / 解码</h2>
    <div class="mode-toggle">
      <button class="active" id="btnEncode" onclick="setMode('encode')">编码 Encode</button>
      <button id="btnDecode" onclick="setMode('decode')">解码 Decode</button>
    </div>
    <div class="mode-toggle" style="margin-top:-8px;">
      <button class="active" id="btnFull" onclick="setScope('full')">encodeURIComponent</button>
      <button id="btnPartial" onclick="setScope('partial')">encodeURI（保留 URI 结构符）</button>
    </div>

    <textarea id="inputText" rows="5" placeholder="在此输入要处理的文本…" oninput="autoProcess()"></textarea>

    <div class="actions">
      <button onclick="process()">执行</button>
      <button class="secondary" onclick="swap()">↕ 交换输入输出</button>
      <button class="secondary" onclick="clearAll()">清空</button>
    </div>

    <div class="output-header">
      <span class="output-label">结果</span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">复制</button>
    </div>
    <div class="output-box" id="outputBox">—</div>

    <div class="stats" id="stats"></div>
  </div>

  <!-- URL 解析 -->
  <div class="card">
    <h2>URL 解析</h2>
    <textarea id="urlInput" rows="3" placeholder="粘贴完整 URL，如：https://example.com/path?foo=bar&q=hello%20world" oninput="parseUrl()"></textarea>

    <div id="urlParts" class="url-parts" style="margin-top:12px;display:none;"></div>

    <div id="paramsSection" style="display:none;">
      <div class="divider">Query 参数</div>
      <table class="params-table">
        <thead><tr><th>#</th><th>参数名</th><th>原始值</th><th>解码值</th></tr></thead>
        <tbody id="paramsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Query String 构建器 -->
  <div class="card">
    <h2>Query String 构建器</h2>
    <div id="builderRows"></div>
    <div class="actions" style="margin-top:14px;">
      <button class="secondary" onclick="addRow()">+ 添加参数</button>
      <button onclick="buildQuery()">生成</button>
      <button class="secondary" onclick="clearBuilder()">清空</button>
    </div>
    <div class="output-header" style="margin-top:4px;">
      <span class="output-label">Query String</span>
      <button class="copy-btn" id="copyQsBtn" onclick="copyQs()">复制</button>
    </div>
    <div class="output-box" id="qsOutput">—</div>
  </div>
</div>

<script>
  let mode = 'encode', scope = 'full';

  function setMode(m) {
    mode = m;
    document.getElementById('btnEncode').classList.toggle('active', m === 'encode');
    document.getElementById('btnDecode').classList.toggle('active', m === 'decode');
    autoProcess();
  }

  function setScope(s) {
    scope = s;
    document.getElementById('btnFull').classList.toggle('active', s === 'full');
    document.getElementById('btnPartial').classList.toggle('active', s === 'partial');
    autoProcess();
  }

  function autoProcess() { process(); }

  function process() {
    const input = document.getElementById('inputText').value;
    const box = document.getElementById('outputBox');
    const stats = document.getElementById('stats');
    if (!input) { box.textContent = '—'; box.className = 'output-box'; stats.innerHTML = ''; return; }
    try {
      let result;
      if (mode === 'encode') {
        result = scope === 'full' ? encodeURIComponent(input) : encodeURI(input);
      } else {
        result = scope === 'full' ? decodeURIComponent(input) : decodeURI(input);
      }
      box.textContent = result;
      box.className = 'output-box';
      stats.innerHTML = `
        <div class="stat">输入 <span>${input.length}</span> 字符</div>
        <div class="stat">输出 <span>${result.length}</span> 字符</div>
        <div class="stat">变化 <span>${result.length - input.length >= 0 ? '+' : ''}${result.length - input.length}</span></div>
      `;
    } catch (e) {
      box.textContent = '错误：' + e.message;
      box.className = 'output-box error';
      stats.innerHTML = '';
    }
  }

  function swap() {
    const out = document.getElementById('outputBox').textContent;
    if (out === '—') return;
    document.getElementById('inputText').value = out;
    process();
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputBox').textContent = '—';
    document.getElementById('outputBox').className = 'output-box';
    document.getElementById('stats').innerHTML = '';
  }

  function copyResult() {
    const text = document.getElementById('outputBox').textContent;
    if (text === '—') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    });
  }

  // URL parser
  function parseUrl() {
    const raw = document.getElementById('urlInput').value.trim();
    const partsDiv = document.getElementById('urlParts');
    const paramsSection = document.getElementById('paramsSection');
    const paramsBody = document.getElementById('paramsBody');

    if (!raw) { partsDiv.style.display = 'none'; paramsSection.style.display = 'none'; return; }

    let url;
    try {
      url = new URL(raw);
    } catch {
      partsDiv.style.display = 'block';
      partsDiv.innerHTML = '<div style="color:#f87171;font-size:0.85rem;">无效的 URL，请确保包含协议（如 https://）</div>';
      paramsSection.style.display = 'none';
      return;
    }

    const parts = [
      { label: '协议', value: url.protocol },
      { label: '主机', value: url.hostname },
      { label: '端口', value: url.port || '（默认）' },
      { label: '路径', value: url.pathname },
      { label: 'Query', value: url.search || '（无）' },
      { label: 'Hash', value: url.hash || '（无）' },
    ];

    partsDiv.style.display = 'block';
    partsDiv.innerHTML = parts.map(p =>
      `<div class="url-part-row"><span class="url-part-label">${p.label}</span><span class="url-part-value">${escHtml(p.value)}</span></div>`
    ).join('');

    const params = [...url.searchParams.entries()];
    if (params.length > 0) {
      paramsSection.style.display = 'block';
      paramsBody.innerHTML = params.map(([k, v], i) => {
        const rawVal = getRawParam(url.search, k, i);
        return `<tr>
          <td style="color:#64748b;font-size:0.78rem;">${i + 1}</td>
          <td class="param-key">${escHtml(k)}</td>
          <td class="param-val">${escHtml(rawVal)}</td>
          <td class="param-val">${escHtml(v)}</td>
        </tr>`;
      }).join('');
    } else {
      paramsSection.style.display = 'none';
    }
  }

  function getRawParam(search, key, idx) {
    // Extract raw (undecoded) value from query string
    const qs = search.startsWith('?') ? search.slice(1) : search;
    const pairs = qs.split('&');
    let count = 0;
    for (const pair of pairs) {
      const eq = pair.indexOf('=');
      const k = eq === -1 ? pair : pair.slice(0, eq);
      if (decodeURIComponent(k.replace(/\+/g, ' ')) === key) {
        if (count === idx) return eq === -1 ? '' : pair.slice(eq + 1);
        count++;
      }
    }
    return '';
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Builder
  let rowCount = 0;

  function addRow(k = '', v = '') {
    rowCount++;
    const id = rowCount;
    const div = document.createElement('div');
    div.id = `row-${id}`;
    div.style.cssText = 'display:flex;gap:10px;margin-bottom:8px;align-items:center;';
    div.innerHTML = `
      <input style="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:0.88rem;outline:none;" placeholder="参数名" value="${escHtml(k)}" oninput="buildQuery()">
      <input style="flex:2;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:0.88rem;outline:none;" placeholder="参数值" value="${escHtml(v)}" oninput="buildQuery()">
      <button class="danger" style="padding:8px 12px;font-size:0.8rem;" onclick="removeRow(${id})">✕</button>
    `;
    document.getElementById('builderRows').appendChild(div);
    buildQuery();
  }

  function removeRow(id) {
    const el = document.getElementById(`row-${id}`);
    if (el) el.remove();
    buildQuery();
  }

  function buildQuery() {
    const rows = document.querySelectorAll('#builderRows > div');
    const params = [];
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const k = inputs[0].value.trim();
      const v = inputs[1].value;
      if (k) params.push([k, v]);
    });
    const out = document.getElementById('qsOutput');
    if (!params.length) { out.textContent = '—'; return; }
    const qs = params.map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    out.textContent = '?' + qs;
  }

  function clearBuilder() {
    document.getElementById('builderRows').innerHTML = '';
    document.getElementById('qsOutput').textContent = '—';
    rowCount = 0;
  }

  function copyQs() {
    const text = document.getElementById('qsOutput').textContent;
    if (text === '—') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyQsBtn');
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    });
  }

  // Init builder with 2 rows
  addRow(); addRow();
</script>
</body>
</html>
